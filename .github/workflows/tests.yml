name: NATIVE BUTLER DEPLOY

on:
  push:
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Version File
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ github.ref_name }}" > "i-(don't)-want-to-belive/version.txt"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Godot (Mono Version with Templates)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-mono: true
          include-templates: true

      - name: Clear NuGet Cache
        run: dotnet nuget locals all --clear

      - name: Import project
        working-directory: i-(don't)-want-to-belive
        run: |
          godot --headless --import

      - name: Run tests
        working-directory: i-(don't)-want-to-belive
        run: |
          godot --headless -s res://addons/gut/gut_cmdln.gd -gdir=res://tests -gprefix=test_ -gexit
