services:
  postgres:
    command: postgres -c shared_buffers=512MB -c cluster_name=nakama
    image: postgres:12.2-alpine
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_PASSWORD=local_db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:3.25.0
    volumes:
      - ./nakama-config.yml:/nakama/data/local.yaml
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --config /nakama/data/local.yaml &&
        exec /nakama/nakama --config /nakama/data/local.yaml
    depends_on:
      - postgres
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"

volumes:
  postgres-data:
