name: Testy GUT i Publikacja na Itch.io

on:
  push:
    branches: [ "main", "master" ] 
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2

      - name: Import project
        working-directory: i-(don't)-want-to-belive
        run: |
          godot --headless --import

      - name: Run tests
        working-directory: i-(don't)-want-to-belive
        run: |
          godot --headless -s res://addons/gut/gut_cmdln.gd -gdir=res://tests -gprefix=test_ -gexit

  deploy:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot for Export
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2

      - name: Import project before export
        working-directory: i-(don't)-want-to-belive
        run: |
          godot --headless --import

      - name: Export Windows Build
        working-directory: i-(don't)-want-to-belive
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/gra.exe

      - name: Get tag version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Wysyłka na Itch.io za pomocą Butlera
        uses: josephbmanley/butler-publish-action@v1.0.3
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: windows
          ITCH_GAME: nie-chc-uwierzy
          ITCH_USER: Zuthen
          PACKAGE: i-(don't)-want-to-belive/build/windows
